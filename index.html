<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苏州市保安员职业技能竞赛抽签</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 40px 15px;
        }
        .container {
            width: 500px;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #2c3e50; margin-bottom: 20px; font-size: 24px; }
        .query-box { margin: 25px 0; }
        .query-box input {
            width: 65%;
            padding: 12px 15px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        .query-box button {
            padding: 12px 25px;
            font-size: 16px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 5px;
            font-weight: bold;
        }
        .query-box button:hover { background: #2980b9; }
        .query-box button:disabled { background: #bdc3c7; cursor: not-allowed; }
        .result {
            margin-top: 20px;
            font-size: 22px;
            padding: 20px;
            background: #eaf7ee;
            border-radius: 10px;
            color: #27ae60;
            display: none;
            font-weight: bold;
        }
        .result.error { background: #fdecea; color: #c0392b; }
        .result.warning { background: #fef9e7; color: #f39c12; }
        .admin-panel {
            display: none;
            text-align: left;
            margin-top: 30px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }
        .admin-panel h3 { margin-bottom: 10px; color: #e67e22; }
        .admin-group { margin-bottom: 15px; }
        .admin-group label { font-weight: bold; display: block; margin-bottom: 5px; }
        .admin-group textarea {
            width: 100%;
            height: 90px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            resize: vertical;
            font-size: 14px;
        }
        .admin-btn {
            padding: 10px 18px;
            font-size: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
            color: white;
        }
        .btn-save { background: #3498db; }
        .btn-save:hover { background: #2980b9; }
        .btn-export { background: #27ae60; }
        .btn-export:hover { background: #219a52; }
        .btn-clear { background: #e74c3c; }
        .btn-clear:hover { background: #c0392b; }
        .info-text { font-size: 14px; color: #7f8c8d; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>苏州市保安员职业技能竞赛抽签</h1>
    <p style="color: #7f8c8d;">请输入您的姓名，点击按钮抽取号码</p>
    <div class="query-box">
        <input type="text" id="nameInput" placeholder="输入姓名" autocomplete="off">
        <button id="drawBtn" onclick="drawForUser()">抽签</button>
    </div>
    <div class="result" id="resultDisplay"></div>

    <div class="admin-panel" id="adminPanel">
        <h3>🔧 管理员设置（仅此页面可见）</h3>
        <p class="info-text">请先粘贴名单，点击“保存名单”。名单保存后参与者才能抽签。</p>
        <div class="admin-group">
            <label>押运组名单（15人，号码池 1-15）</label>
            <textarea id="group1Names" placeholder="每行一个姓名，共15人"></textarea>
        </div>
        <div class="admin-group">
            <label>技防组名单（8人，号码池 16-23）</label>
            <textarea id="group2Names" placeholder="每行一个姓名，共8人"></textarea>
        </div>
        <div class="admin-group">
            <label>人防组名单（79人，号码池 23-101，每人一号，无空号）</label>
            <textarea id="group3Names" placeholder="每行一个姓名，共79人"></textarea>
        </div>
        <button class="admin-btn btn-save" onclick="saveNameList()">💾 保存名单</button>
        <button class="admin-btn btn-export" onclick="exportAllResults()">📥 导出全部结果</button>
        <button class="admin-btn btn-clear" onclick="clearAllData()">🗑️ 重置全部数据</button>
    </div>
</div>

<script>
    const STORAGE_NAMES = 'lottery_names';
    const STORAGE_RESULT = 'lottery_result';
    const STORAGE_POOLS = 'lottery_pools';

    function getData(key) {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : null;
    }
    function setData(key, data) {
        localStorage.setItem(key, JSON.stringify(data));
    }

    function createPools() {
        const pool1 = [];
        for (let i = 1; i <= 15; i++) pool1.push(i);
        const pool2 = [];
        for (let i = 16; i <= 23; i++) pool2.push(i);
        const pool3 = [];
        for (let i = 23; i <= 101; i++) pool3.push(i);  // 改为23-101，共79个号码，全部用于79人
        return { group1: pool1, group2: pool2, group3: pool3 };
    }

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function saveNameList() {
        const g1 = document.getElementById('group1Names').value.trim().split('\n').map(s => s.trim()).filter(s => s);
        const g2 = document.getElementById('group2Names').value.trim().split('\n').map(s => s.trim()).filter(s => s);
        const g3 = document.getElementById('group3Names').value.trim().split('\n').map(s => s.trim()).filter(s => s);

        if (g1.length !== 15) return alert('押运组必须正好15人');
        if (g2.length !== 8) return alert('技防组必须正好8人');
        if (g3.length !== 79) return alert('人防组必须正好79人');

        setData(STORAGE_NAMES, { group1: g1, group2: g2, group3: g3 });
        const pools = createPools();
        shuffle(pools.group1);
        shuffle(pools.group2);
        shuffle(pools.group3);
        setData(STORAGE_POOLS, pools);
        setData(STORAGE_RESULT, {});

        alert('名单已保存，号码池已初始化。参与者现在可以抽签了。');
        document.getElementById('group1Names').value = '';
        document.getElementById('group2Names').value = '';
        document.getElementById('group3Names').value = '';
    }

    function drawForUser() {
        const name = document.getElementById('nameInput').value.trim();
        const resultDiv = document.getElementById('resultDisplay');
        const btn = document.getElementById('drawBtn');

        if (!name) {
            resultDiv.className = 'result error';
            resultDiv.innerText = '请输入姓名';
            resultDiv.style.display = 'block';
            return;
        }

        const names = getData(STORAGE_NAMES);
        const pools = getData(STORAGE_POOLS);
        const results = getData(STORAGE_RESULT) || {};

        if (!names || !pools) {
            resultDiv.className = 'result error';
            resultDiv.innerText = '抽签尚未开始，请等待管理员设置。';
            resultDiv.style.display = 'block';
            return;
        }

        let group = null;
        if (names.group1.includes(name)) group = 'group1';
        else if (names.group2.includes(name)) group = 'group2';
        else if (names.group3.includes(name)) group = 'group3';
        else {
            resultDiv.className = 'result error';
            resultDiv.innerText = '您不在参与名单中，无法抽签。';
            resultDiv.style.display = 'block';
            return;
        }

        if (results[name]) {
            const exist = results[name];
            resultDiv.className = 'result warning';
            resultDiv.innerText = `${name}，您已抽过签，号码是：${exist.number}（${exist.group}）`;
            resultDiv.style.display = 'block';
            return;
        }

        const groupPool = pools[group];
        if (groupPool.length === 0) {
            resultDiv.className = 'result error';
            resultDiv.innerText = '该组号码已全部抽完，请联系管理员。';
            resultDiv.style.display = 'block';
            return;
        }

        const drawnNum = groupPool.pop();
        setData(STORAGE_POOLS, pools);

        let groupDisplay = '';
        if (group === 'group1') groupDisplay = '押运组';
        else if (group === 'group2') groupDisplay = '技防组';
        else if (group === 'group3') groupDisplay = '人防组';

        results[name] = { group: groupDisplay, number: drawnNum };
        setData(STORAGE_RESULT, results);

        resultDiv.className = 'result';
        resultDiv.innerText = `${name}，您的抽签号码是：${drawnNum}（${groupDisplay}）`;
        resultDiv.style.display = 'block';

        btn.disabled = true;
        setTimeout(() => { btn.disabled = false; }, 500);
    }

    function exportAllResults() {
        const results = getData(STORAGE_RESULT);
        if (!results || Object.keys(results).length === 0) {
            alert('暂无抽签结果');
            return;
        }
        let csv = '\uFEFF姓名,组别,号码\n';
        for (const [name, info] of Object.entries(results)) {
            csv += `${name},${info.group},${info.number}\n`;
        }
        const pools = getData(STORAGE_POOLS);
        if (pools) {
            csv += '\n剩余未抽号码\n';
            csv += `押运组剩余: ${pools.group1.join(',') || '无'}\n`;
            csv += `技防组剩余: ${pools.group2.join(',') || '无'}\n`;
            csv += `人防组剩余: ${pools.group3.join(',') || '无'}\n`;
        }
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = '抽签结果.csv';
        link.click();
    }

    function clearAllData() {
        if (confirm('确定要清除名单、号码池和所有抽签结果吗？')) {
            localStorage.removeItem(STORAGE_NAMES);
            localStorage.removeItem(STORAGE_POOLS);
            localStorage.removeItem(STORAGE_RESULT);
            alert('所有数据已清除。');
        }
    }

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('admin') === 'true') {
        document.getElementById('adminPanel').style.display = 'block';
        const savedNames = getData(STORAGE_NAMES);
        if (savedNames) {
            document.getElementById('group1Names').value = savedNames.group1.join('\n');
            document.getElementById('group2Names').value = savedNames.group2.join('\n');
            document.getElementById('group3Names').value = savedNames.group3.join('\n');
        }
    }

    document.getElementById('nameInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            drawForUser();
        }
    });
</script>
</body>
</html>
